<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagenes/primericono.ico">
    <title>Mi primer página web</title>
    
</head>
<body>
    <header>
        <!--Define el encabezado de una página o sección. Contiene elementos como logotipos, títulos y menús de navegación-->
        <img src="./imagenes/img fondo.jpg" alt="imagen de fondo" width="device-width" height="device-height">
        <h1><strong>Brispon</strong></h1>
        <h2>Bienvenido / Welcome</h2>
    </header>
    <nav>
        <!--Representa una sección de navegación con enlaces a otras partes de la página o a diferentes páginas-->
        <ul>
            <li>Inicio</li>
            <li>Productos</li>
            <li>Contacto</li>
        </ul>
    </nav>
    <main>
        <!--Contiene el contenido principal del documento, es único y esencial para la página-->
        <p>Escribir acá una introducción o presentación a la página, utilizar <strong>así</strong>, <em>así</em> y <s>así</s> según
            sea necesario</p>
        <p>¡Encontrá los mejores artículos para vos y tu hogar!</p>

        <section>
            <img src="./imagenes/img_bazar.jpg" height="200" width="400" alt="imagen 1 del bazar"><br><br>
        </section>

        <iframe width="400" height="200" src="https://www.youtube.com/embed/U12EMj_SW_0?cc_load_policy=1" title="BAZAR CHINO 😉10 COSAS QUE MERECE COMPRAR EN UN BAZAR CHINO😱" frameborder="1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe><br><br>

        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d26267.180604220022!2d-58.41964754999999!3d-34.619392!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sar!4v1728136933810!5m2!1ses-419!2sar" width="400" height="250" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </main>

    <footer>
        <!--Pie de página, generalmente se encuentran derechos de autor, enlaces adicionales y contactos-->
        <p>Escribir un párrafo de contacto o formulario</p>

        <form action="https://formspree.io/f/xbljreoo" method="POST">
            <input type="text" name="nombre" id="nombre" placeholder="Escribe tu nombre"><br>
            <input type="email" name="email" id="email" placeholder="Escribe tu email"><br>
            <textarea name="mensaje" id="mensaje" rows="4" cols="50" placeholder="Escribe tu mensaje"></textarea><br>
            <button type="submit">Enviar</button><br>
        </form>

    </footer>
    
</body>
</html>
